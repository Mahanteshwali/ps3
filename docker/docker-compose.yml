version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: threat_redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:7
    container_name: threat_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: threatdb

  api:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.api
    container_name: threat_api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
      - mongo
    volumes:
      - ../backend:/app

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.api
    container_name: threat_worker
    command: python -m detection.stream_consumer
    env_file:
      - ../.env
    depends_on:
      - redis
      - mongo
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: threat_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  attacker_frontend:
    build:
      context: ../attacker-frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: threat_attacker_frontend
    ports:
      - "3001:3001"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: threat_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend

volumes:
  redis_data:
  mongo_data:
